{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rao.fullnameWithSuffix" (dict "context" . "suffix" "webhook-service") }}
  labels:
    {{- include "rao.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "rao.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.webhook.servicePort }}
      targetPort: {{ .Values.webhook.targetPort }}
      protocol: TCP
{{- end }}
