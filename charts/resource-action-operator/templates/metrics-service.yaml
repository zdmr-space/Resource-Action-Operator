{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rao.fullnameWithSuffix" (dict "context" . "suffix" "controller-manager-metrics-service") }}
  labels:
    {{- include "rao.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "rao.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.metrics.service.port }}
      targetPort: {{ .Values.metrics.service.port }}
      protocol: TCP
{{- end }}
