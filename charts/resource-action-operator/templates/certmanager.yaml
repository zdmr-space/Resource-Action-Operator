{{- if and .Values.webhook.enabled .Values.webhook.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.webhook.certManager.issuerName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rao.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.webhook.certManager.certificateName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rao.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.webhook.certSecretName }}
  issuerRef:
    kind: Issuer
    name: {{ .Values.webhook.certManager.issuerName }}
  dnsNames:
    - {{ include "rao.fullnameWithSuffix" (dict "context" . "suffix" "webhook-service") }}.{{ .Release.Namespace }}.svc
    - {{ include "rao.fullnameWithSuffix" (dict "context" . "suffix" "webhook-service") }}.{{ .Release.Namespace }}.svc.cluster.local
{{- end }}
