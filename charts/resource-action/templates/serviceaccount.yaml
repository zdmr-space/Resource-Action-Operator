{{- if and (eq .Values.action.type "job") .Values.job.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ra.serviceAccountName" . }}
  namespace: {{ default .Release.Namespace .Values.resourceAction.namespace }}
  labels:
    {{- include "ra.labels" . | nindent 4 }}
  {{- with .Values.job.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
