{{- if .Values.resourceAction.create }}
apiVersion: ops.yusaozdemir.de/v1alpha1
kind: ResourceAction
metadata:
  name: {{ include "ra.resourceActionName" . }}
  namespace: {{ default .Release.Namespace .Values.resourceAction.namespace }}
  labels:
    {{- include "ra.labels" . | nindent 4 }}
spec:
  selector:
    group: {{ .Values.selector.group | quote }}
    version: {{ .Values.selector.version | quote }}
    kind: {{ .Values.selector.kind | quote }}
  events:
    {{- toYaml .Values.events | nindent 4 }}
  {{- with .Values.filters }}
  filters:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  actions:
    - type: {{ .Values.action.type | quote }}
      mode: {{ .Values.action.mode | quote }}
      {{- if .Values.action.schedule }}
      schedule: {{ .Values.action.schedule | quote }}
      {{- end }}
      {{- if eq .Values.action.type "http" }}
      method: {{ .Values.http.method | quote }}
      url: {{ .Values.http.url | quote }}
      {{- with .Values.http.headers }}
      headers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.http.body }}
      body:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.http.expectedStatus }}
      expectedStatus: {{ .Values.http.expectedStatus | quote }}
      {{- end }}
      timeout: {{ .Values.http.timeout | quote }}
      {{- with .Values.http.retry }}
      retry:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.http.tls }}
      tls:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.http.urlPolicy }}
      urlPolicy:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else if eq .Values.action.type "job" }}
      job:
        image: {{ include "ra.jobImage" . | quote }}
        {{- if .Values.job.script }}
        script: |
{{ .Values.job.script | nindent 10 }}
        {{- end }}
        {{- with .Values.job.interpreterCommand }}
        interpreterCommand:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.job.command }}
        command:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.job.args }}
        args:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.job.env }}
        env:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.job.volumes }}
        volumes:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.job.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        allowRunAsRoot: {{ .Values.job.allowRunAsRoot }}
        {{- $saName := include "ra.serviceAccountName" . }}
        {{- if $saName }}
        serviceAccountName: {{ $saName | quote }}
        {{- end }}
        automountServiceAccountToken: {{ .Values.job.automountServiceAccountToken }}
        timeout: {{ .Values.job.timeout | quote }}
        logTailLines: {{ .Values.job.logTailLines }}
        ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
        backoffLimit: {{ .Values.job.backoffLimit }}
        {{- with .Values.job.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
{{- end }}
