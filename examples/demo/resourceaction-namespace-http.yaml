---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: resource-action-operator-dynamic-watch
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: resource-action-operator-dynamic-watch
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: resource-action-operator-dynamic-watch
subjects:
  - kind: ServiceAccount
    name: resource-action-operator-controller-manager
    namespace: resource-action-operator-system
---
apiVersion: ops.yusaozdemir.de/v1alpha1
kind: ResourceAction
metadata:
  name: namespace-http-hook
  namespace: default
spec:
  selector:
    group: ""
    version: v1
    kind: Namespace
  events:
    - Create
  filters:
    nameRegex: "^demo-http-trigger-.*$"
  actions:
    - type: http
      mode: once
      method: POST
      url: http://ra-http-sink.demo-http-sink.svc.cluster.local/hook
      expectedStatus: "^2..$"
      timeout: 10s
      body:
        template: |
          {
            "event": "namespace.create",
            "name": "{{ .metadata.name }}",
            "uid": "{{ .metadata.uid }}"
          }
