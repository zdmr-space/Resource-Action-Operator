apiVersion: ops.yusaozdemir.de/v1alpha1
kind: ResourceAction
metadata:
  name: deployment-http-hook
  namespace: ra-demo
spec:
  selector:
    group: apps
    version: v1
    kind: Deployment
  events:
    - Create
    - Delete
  filters:
    namespaceRegex: "^ra-demo$"
    nameRegex: "^trigger-nginx-.*$"
  actions:
    - type: http
      mode: once
      method: POST
      url: http://ra-nginx-http.ra-demo.svc.cluster.local/hook
      expectedStatus: "^2..$"
      timeout: 10s
      body:
        template: |
          {
            "channel": "http",
            "event": "{{ .metadata.name }}",
            "resource": {
              "name": "{{ .metadata.name }}",
              "namespace": "{{ .metadata.namespace }}",
              "uid": "{{ .metadata.uid }}"
            }
          }
