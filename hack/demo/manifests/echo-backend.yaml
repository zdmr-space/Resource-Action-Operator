apiVersion: apps/v1
kind: Deployment
metadata:
  name: ra-echo
  namespace: ra-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ra-echo
  template:
    metadata:
      labels:
        app: ra-echo
    spec:
      containers:
        - name: echo
          image: ealen/echo-server:0.9.2
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ra-echo
  namespace: ra-demo
spec:
  selector:
    app: ra-echo
  ports:
    - name: http
      port: 80
      targetPort: 80
