apiVersion: v1
kind: ConfigMap
metadata:
  name: ra-nginx-http-conf
  namespace: ra-demo
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8080;

        access_log /var/log/nginx/access.log;

        location /hook {
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Request-Id $request_id;
          proxy_set_header Host $host;
          proxy_pass http://ra-echo.ra-demo.svc.cluster.local/;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ra-nginx-http
  namespace: ra-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ra-nginx-http
  template:
    metadata:
      labels:
        app: ra-nginx-http
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: conf
          configMap:
            name: ra-nginx-http-conf
---
apiVersion: v1
kind: Service
metadata:
  name: ra-nginx-http
  namespace: ra-demo
spec:
  selector:
    app: ra-nginx-http
  ports:
    - name: http
      port: 80
      targetPort: 8080
