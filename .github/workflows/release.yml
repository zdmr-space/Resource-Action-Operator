name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, e.g. 0.2.0-rc1"
        required: true
        type: string
      publish_image:
        description: "Publish the operator image to GHCR"
        required: true
        default: true
        type: boolean
      publish_charts:
        description: "Publish Helm charts to GitHub Pages releases"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/zdmr-space/resource-action-operator

jobs:
  prepare:
    name: Resolve Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      publish_image: ${{ steps.vars.outputs.publish_image }}
      publish_charts: ${{ steps.vars.outputs.publish_charts }}
      is_tag_release: ${{ steps.vars.outputs.is_tag_release }}
    steps:
      - name: Resolve workflow variables
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            PUBLISH_IMAGE=true
            PUBLISH_CHARTS=true
            IS_TAG_RELEASE=true
          else
            VERSION="${{ inputs.version }}"
            PUBLISH_IMAGE="${{ inputs.publish_image }}"
            PUBLISH_CHARTS="${{ inputs.publish_charts }}"
            IS_TAG_RELEASE=false
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Version must not be empty" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "publish_image=${PUBLISH_IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "publish_charts=${PUBLISH_CHARTS}" >> "${GITHUB_OUTPUT}"
          echo "is_tag_release=${IS_TAG_RELEASE}" >> "${GITHUB_OUTPUT}"

  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Run Go tests
        run: make test

      - name: Lint operator chart
        run: helm lint charts/resource-action-operator

      - name: Lint job chart
        run: helm lint charts/resource-action-job

      - name: Render operator chart
        run: |
          helm template resource-action-operator charts/resource-action-operator \
            --set image.registry=ghcr.io \
            --set image.repository=zdmr-space/resource-action-operator \
            --set image.tag=${{ needs.prepare.outputs.version }} > /tmp/operator-chart.yaml

      - name: Render job chart
        run: |
          helm template deployment-job charts/resource-action-job \
            --set job.image.registry=registry.example.com \
            --set job.image.repository=platform/bash-runner \
            --set job.image.tag=1.2.3 > /tmp/job-chart.yaml

  publish-image:
    name: Publish Operator Image
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    if: needs.prepare.outputs.publish_image == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=sha
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_tag_release == 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-charts:
    name: Publish Helm Charts
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    if: needs.prepare.outputs.publish_charts == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Publish chart releases
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
