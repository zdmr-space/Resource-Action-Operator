name: Helm

on:
  push:
  pull_request:

jobs:
  helm:
    name: Lint and Render Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint operator chart
        run: helm lint charts/resource-action-operator

      - name: Lint job chart
        run: helm lint charts/resource-action-job

      - name: Render operator chart
        run: |
          helm template resource-action-operator charts/resource-action-operator \
            --set image.registry=ghcr.io \
            --set image.repository=zdmr-space/resource-action-operator \
            --set image.tag=0.2.0-rc3 > /tmp/operator-chart.yaml

      - name: Render job chart
        run: |
          helm template deployment-job charts/resource-action-job \
            --set selector.group=apps \
            --set selector.version=v1 \
            --set selector.kind=Deployment \
            --set job.image.registry=registry.example.com \
            --set job.image.repository=platform/bash-runner \
            --set job.image.tag=1.2.3 > /tmp/job-chart.yaml
