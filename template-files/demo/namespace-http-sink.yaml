apiVersion: v1
kind: Namespace
metadata:
  name: demo-http-sink
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ra-http-sink-nginx
  namespace: demo-http-sink
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      access_log /dev/stdout;
      error_log /dev/stderr warn;

      location = /hook {
        add_header Content-Type text/plain;
        return 200 "ok\n";
      }

      location / {
        add_header Content-Type text/plain;
        return 200 "nginx sink alive\n";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ra-http-sink
  namespace: demo-http-sink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ra-http-sink
  template:
    metadata:
      labels:
        app: ra-http-sink
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: ra-http-sink-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: ra-http-sink
  namespace: demo-http-sink
spec:
  selector:
    app: ra-http-sink
  ports:
    - name: http
      port: 80
      targetPort: 8080
